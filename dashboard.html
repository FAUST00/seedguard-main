<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <title>SeedGuard | Dashboard</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #0a0a0a;
      color: #e5e5e5;
      margin: 0;
      min-height: 100vh;
      background-image: linear-gradient(rgba(10,10,25,0.85), rgba(10,10,25,0.85)), url('https://images.unsplash.com/photo-1518709268805-4e9042af2176?q=80&w=2070');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
    }
    .neon-cyan { color: #22d3ee; text-shadow: 0 0 10px #22d3ee, 0 0 20px #22d3ee; }
    .neon-pink { color: #f472b6; text-shadow: 0 0 10px #f472b6, 0 0 20px #f472b6; }
    .card {
      background: rgba(15, 23, 42, 0.9);
      border: 1px solid #6366f1;
      border-radius: 16px;
      padding: 20px;
    }
  </style>
</head>
<body class="flex">

  <aside class="w-64 p-6 border-r border-zinc-800 bg-black/70 hidden md:block">
    <h1 class="text-3xl font-bold neon-pink mb-10">SEEDGUARD</h1>
    <a href="dashboard.html" class="block px-4 py-3 bg-zinc-900 rounded-xl text-white mb-2">📊 Dashboard</a>
    <a href="history.html" class="block px-4 py-3 hover:bg-zinc-900 rounded-xl text-zinc-400">📖 History</a>
  </aside>

  <main class="flex-1 p-8">
    <h1 class="text-5xl font-bold neon-cyan mb-2">DASHBOARD</h1>
    <p class="text-zinc-400 mb-8">Austo™ • Beta v0.4</p>

    <!-- Current Streak -->
    <div class="card mb-8">
      <h2 class="text-xl mb-4 neon-cyan">⏳ CURRENT STREAK</h2>
      <div class="text-center">
        <div id="days" class="text-8xl font-bold neon-pink">42</div>
        <div class="text-sm text-zinc-400">DAYS</div>
      </div>
      <button onclick="resetStreak()" class="mt-6 w-full py-4 bg-red-600 hover:bg-red-700 rounded-xl">I'M RELAPSING</button>
    </div>

    <!-- Milestones -->
    <div class="card">
      <h2 class="text-2xl mb-6 neon-cyan">🌟 JOURNEY MILESTONES</h2>
      <div id="milestones" class="space-y-4"></div>
    </div>
  </main>

  <script>
    // Your streak data
    let streak = localStorage.getItem('seedguardStreak') || 42;

    const milestones = [
      {days:7, title:"The Awakening", benefits:"Increased awareness, motivation surge, better sleep"},
      {days:21, title:"Dopamine Reset", benefits:"Clearer thinking, reduced cravings"},
      {days:42, title:"First Transformation", benefits:"Natural confidence, productivity boost"},
      {days:56, title:"Social Shift", benefits:"Stronger presence & respect"},
      {days:70, title:"Warrior Mode", benefits:"Flow state, powerful focus"},
      {days:90, title:"Identity Integration", benefits:"Deep clarity, unbreakable discipline"}
    ];

    function render() {
      document.getElementById('days').textContent = streak;
      const container = document.getElementById('milestones');
      container.innerHTML = milestones.map(m => `
        <div class="card p-6 ${streak >= m.days ? 'border-green-500' : ''}">
          <div class="flex justify-between">
            <div>
              <span class="text-4xl font-bold ${streak >= m.days ? 'text-green-400' : 'text-zinc-400'}">${m.days}</span>
              <span class="ml-4 text-xl">${m.title}</span>
            </div>
            ${streak >= m.days ? '🏆' : ''}
          </div>
          <p class="mt-3 text-zinc-300">${m.benefits}</p>
        </div>
      `).join('');
    }

    function resetStreak() {
      if (confirm("Reset streak?")) {
        streak = 0;
        localStorage.setItem('seedguardStreak', '0');
        render();
      }
    }

    render();
  </script>
</body>
</html>
