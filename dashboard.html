<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SeedGuard | Dashboard</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap');
    
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: linear-gradient(rgba(10,10,25,0.93), rgba(10,10,25,0.93)), 
                  url('https://images.unsplash.com/photo-1518709268805-4e9042af2176?q=80&w=2070') center/cover fixed;
      color: #e5e5e5;
      margin: 0;
      min-height: 100vh;
    }
    .neon-cyan { color: #22d3ee; text-shadow: 0 0 20px #22d3ee, 0 0 40px #22d3ee; }
    .neon-pink { color: #f472b6; text-shadow: 0 0 20px #f472b6, 0 0 40px #f472b6; }
    .card {
      background: rgba(15, 23, 42, 0.95);
      border: 1px solid #6366f1;
      border-radius: 20px;
      padding: 24px;
      backdrop-filter: blur(16px);
      box-shadow: 0 0 30px rgba(99, 102, 241, 0.3);
    }
    .milestone-card {
      transition: all 0.3s;
    }
    .milestone-card.unlocked {
      border-color: #4ade80;
      box-shadow: 0 0 25px rgba(74, 222, 128, 0.4);
    }
  </style>
</head>
<body class="flex">

  <!-- Sidebar -->
  <aside class="w-64 border-r border-zinc-800 p-6 hidden md:block bg-black/70">
    <div class="flex items-center gap-3 mb-12">
      <span class="text-4xl">🛡️</span>
      <h1 class="text-3xl font-bold neon-pink">SEEDGUARD</h1>
    </div>
    <nav class="space-y-2">
      <a href="dashboard.html" class="flex items-center gap-3 px-5 py-4 bg-zinc-900 rounded-2xl text-white font-medium">📊 Dashboard</a>
      <a href="history.html" class="flex items-center gap-3 px-5 py-4 hover:bg-zinc-900 rounded-2xl text-zinc-400">📖 History</a>
    </nav>
  </aside>

  <main class="flex-1 p-8">
    <div class="max-w-5xl mx-auto">
      <h1 class="text-5xl font-bold neon-cyan mb-2">DASHBOARD</h1>
      <p class="text-zinc-400 mb-10">Austo™ • Beta v0.4</p>

      <!-- Current Streak -->
      <div class="card mb-10">
        <h2 class="text-xl font-semibold mb-6 flex items-center gap-2">⏳ CURRENT STREAK</h2>
        <div class="flex justify-center gap-12 text-center">
          <div>
            <div id="days" class="text-8xl font-bold neon-pink">42</div>
            <div class="text-xs text-zinc-400 tracking-widest">DAYS</div>
          </div>
        </div>
        <button onclick="resetStreak()" class="mt-8 w-full py-4 bg-red-600 hover:bg-red-700 rounded-xl text-lg font-medium">I'M RELAPSING</button>
      </div>

      <!-- Milestones -->
      <div class="card">
        <h2 class="text-3xl font-bold neon-cyan mb-8">🌟 JOURNEY MILESTONES</h2>
        <div id="milestones" class="space-y-4"></div>
      </div>
    </div>
  </main>

  <script>
    const milestones = [
      {days: 7, title: "The Awakening", benefits: "Increased awareness, motivation surge, better sleep", phase: "Breaking old habits"},
      {days: 21, title: "Dopamine Reset", benefits: "Clearer thinking, reduced cravings", phase: "Mental recalibration"},
      {days: 42, title: "First Transformation", benefits: "Natural confidence, productivity boost", phase: "Energy redirection"},
      {days: 56, title: "Social Shift", benefits: "Stronger presence & respect", phase: "Purposeful energy"},
      {days: 70, title: "Warrior Mode", benefits: "Flow state, powerful focus", phase: "Discipline becomes natural"},
      {days: 90, title: "Identity Integration", benefits: "Deep clarity, unbreakable discipline", phase: "Lifestyle change"}
    ];

    let streak = localStorage.getItem('seedguardStreak') ? parseInt(localStorage.getItem('seedguardStreak')) : 42;

    function render() {
      document.getElementById('days').textContent = streak;

      const container = document.getElementById('milestones');
      container.innerHTML = milestones.map(m => `
        <div class="milestone-card card p-6 ${streak >= m.days ? 'unlocked' : ''}">
          <div class="flex items-center justify-between">
            <div class="flex items-center gap-4">
              <span class="text-5xl font-bold ${streak >= m.days ? 'text-green-400' : 'text-zinc-400'}">${m.days}</span>
              <div>
                <div class="text-xl font-semibold">${m.title}</div>
                <div class="text-sm text-cyan-400">${m.phase}</div>
              </div>
            </div>
            ${streak >= m.days ? '<span class="text-4xl">🏆</span>' : ''}
          </div>
          <p class="mt-4 text-zinc-300">${m.benefits}</p>
        </div>
      `).join('');
    }

    function resetStreak() {
      if (confirm("Reset your streak?")) {
        streak = 0;
        localStorage.setItem('seedguardStreak', '0');
        render();
      }
    }

    render();
  </script>
</body>
</html>
