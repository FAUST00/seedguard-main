<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SeedGuard | Dashboard</title>
  <style>
    body { font-family: system-ui, sans-serif; background: #0a0a0a; color: #e5e5e5; margin: 0; }
    .neon-cyan { color: #22d3ee; text-shadow: 0 0 10px #22d3ee; }
    .neon-pink { color: #f472b6; text-shadow: 0 0 10px #f472b6; }
    .card { background: rgba(20,20,30,0.95); border: 1px solid #6366f1; border-radius: 16px; padding: 20px; }
    .milestone { transition: all 0.3s; }
    .milestone.unlocked { border-color: #22c55e; background: rgba(34,197,94,0.1); }
  </style>
</head>
<body class="min-h-screen bg-zinc-950 flex">

  <!-- Sidebar -->
  <aside class="w-64 border-r border-zinc-800 p-6 hidden md:block">
    <div class="flex items-center gap-3 mb-10">
      <span class="text-3xl">🛡️</span>
      <h1 class="text-2xl font-bold neon-pink">SeedGuard</h1>
    </div>
    <nav class="space-y-2">
      <a href="/dashboard" class="flex items-center gap-3 px-4 py-3 bg-zinc-900 rounded-xl text-white">📊 Dashboard</a>
      <a href="/history" class="flex items-center gap-3 px-4 py-3 hover:bg-zinc-900 rounded-xl text-zinc-400">📖 History</a>
    </nav>
  </aside>

  <main class="flex-1 p-6 md:p-10">
    <div class="max-w-5xl mx-auto">
      <div class="flex justify-between items-center mb-10">
        <h1 class="text-4xl font-bold neon-cyan">DASHBOARD</h1>
        <div class="text-sm text-zinc-500">Austo™ • Beta v0.2</div>
      </div>

      <!-- Current Streak -->
      <div class="card mb-8">
        <div class="flex justify-between items-center mb-6">
          <h2 class="text-xl font-semibold flex items-center gap-2">⏳ CURRENT STREAK</h2>
          <button onclick="resetStreak()" class="text-red-400 hover:text-red-500 text-sm">I'm Relapsing</button>
        </div>
        
        <div class="flex justify-center gap-6 text-center text-6xl font-mono font-bold" id="streak-display">
          <div><span id="days" class="neon-pink">0</span><div class="text-xs text-zinc-500 mt-1">DAYS</div></div>
          <div class="text-4xl text-zinc-700">:</div>
          <div><span id="hours" class="neon-cyan">00</span><div class="text-xs text-zinc-500 mt-1">HRS</div></div>
          <div><span id="mins" class="neon-cyan">02</span><div class="text-xs text-zinc-500 mt-1">MIN</div></div>
          <div><span id="secs" class="neon-cyan">56</span><div class="text-xs text-zinc-500 mt-1">SEC</div></div>
        </div>
      </div>

      <!-- Milestones -->
      <div class="card">
        <h2 class="text-2xl font-bold mb-8 neon-cyan flex items-center gap-3">🌟 YOUR JOURNEY MILESTONES</h2>
        
        <div class="grid md:grid-cols-2 gap-6" id="milestones">
          <!-- Populated by JavaScript -->
        </div>
      </div>

      <div class="mt-8 text-center text-zinc-500 text-sm">
        Track your streak. Build your identity. Become unstoppable.
      </div>
    </div>
  </main>

  <script>
    // Milestone Data
    const milestones = [
      {days: 7, title: "The Awakening", phase: "Breaking old habits", benefits: "Increased awareness, motivation, better focus"},
      {days: 21, title: "Dopamine Reset", phase: "Mental recalibration", benefits: "Clearer thinking, reduced cravings"},
      {days: 42, title: "First Transformation", phase: "Energy redirection", benefits: "Natural confidence & productivity"},
      {days: 56, title: "Social Shift", phase: "Purposeful energy", benefits: "Stronger presence and respect"},
      {days: 70, title: "Warrior Mode", phase: "Discipline becomes natural", benefits: "Flow state & powerful focus"},
      {days: 90, title: "Identity Integration", phase: "Lifestyle change", benefits: "Deep clarity & unbreakable discipline"}
    ];

    let currentStreak = 12; // Change this number to test different milestones

    function renderMilestones() {
      const container = document.getElementById('milestones');
      container.innerHTML = milestones.map(m => `
        <div class="milestone card p-6 ${currentStreak >= m.days ? 'unlocked' : ''}">
          <div class="flex justify-between">
            <div>
              <div class="text-4xl font-bold ${currentStreak >= m.days ? 'text-green-400' : 'text-zinc-400'}">${m.days}</div>
              <div class="text-lg font-semibold">${m.title}</div>
            </div>
            ${currentStreak >= m.days ? '<span class="text-4xl">🏆</span>' : ''}
          </div>
          <p class="mt-4 text-sm text-zinc-400">${m.benefits}</p>
          <p class="text-xs text-cyan-400 mt-3">${m.phase}</p>
        </div>
      `).join('');
    }

    // Simple streak timer simulation
    function updateStreakTimer() {
      // You can expand this later with localStorage
      document.getElementById('days').textContent = currentStreak;
    }

    function resetStreak() {
      if(confirm("Mark as relapse? This will reset your streak.")) {
        currentStreak = 0;
        updateStreakTimer();
        renderMilestones();
      }
    }

    // Initialize
    renderMilestones();
    updateStreakTimer();
  </script>
</body>
</html>
