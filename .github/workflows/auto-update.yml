name: Auto-Update
on:
  schedule:
    - cron: '0 */6 * * *' # Every 6 hours. Change as needed.
  workflow_dispatch: # Adds a manual "Run" button in Actions tab

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "AutoBot"
          git config user.email "autobot@noreply.com"

      - name: Run your update logic
        run: |
          # 👇 REPLACE THIS ENTIRE BLOCK WITH YOUR ACTUAL COMMANDS
          # Examples:
          # curl -s https://api.example.com/data > ./data.json
          # python scripts/generate.py
          # echo "$(date -u)" > ./VERSION
          echo "synced" > ./update-marker.txt

      - name: Detect changes
        id: detect
        run: |
          git add .
          if git diff --staged --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit & Push
        if: steps.detect.outputs.has_changes == 'true'
        run: |
          BRANCH="auto-$(date +%s)"
          git checkout -b "$BRANCH"
          git commit -m "chore: automated update [skip ci]"
          git push origin "$BRANCH"

      - name: Create Pull Request
        if: steps.detect.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GH_TOKEN }}
          commit-message: "chore: automated update"
          branch: "auto-$(date +%s)"
          title: "Auto-update sync"
          body: "Triggered automatically. Review & merge when ready."
          delete-branch: true
