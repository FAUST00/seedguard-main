<?xml version="1.0" encoding="UTF-8"?>
<!--
  SeedGuard Full Logo  (shield + SEEDGUARD text)
  ===============================================
  Edit guide:
    Shield border ......... stroke #00e5ff  (cyan)
    Inner ring ............ stroke #7c3aed  (violet)
    Iris fill ............. #5b21b6         (purple)
    Corner accent dots .... #f0abfc         (magenta/pink)
    Tentacles ............. #22d3ee (cyan) / #a855f7 (violet, bottom)
    SEEDGUARD text ........ fill #00e5ff    (cyan)
    Subtext ............... fill #7c3aed    (violet)
    Background ............ transparent

  Shield polygon vertices  (center ~200,135  w≈194  h≈210):
    Top-left 123,30  Top-right 277,30
    Angle-R  297,62  Lower-R   297,184
    Bottom   200,240
    Lower-L  103,184  Angle-L  103,62

  Eye ellipse: cx=200 cy=135 rx=52 ry=31

  To change text: edit the <text> element near the bottom.
  To change text color: change fill="#00e5ff" on that element.
  To change glow intensity: adjust stdDeviation values in <filter id="text-glow">.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <defs>
    <!-- Wide neon glow for shield border + eye sclera -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6"  result="b1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="12" result="b2"/>
      <feMerge>
        <feMergeNode in="b2"/>
        <feMergeNode in="b1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Tighter glow for iris and accent dots -->
    <filter id="glow-sm" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Text glow for SEEDGUARD -->
    <filter id="text-glow" x="-20%" y="-80%" width="140%" height="260%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5"  result="b1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="10" result="b2"/>
      <feMerge>
        <feMergeNode in="b2"/>
        <feMergeNode in="b1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- ── SHIELD ──────────────────────────────────────────────────── -->
  <!-- Render order: glow → opaque fill (masks inner glow) → crisp border -->
  <polygon points="123,30 277,30 297,62 297,184 200,240 103,184 103,62"
    stroke="#00e5ff" stroke-width="5" stroke-linejoin="round"
    filter="url(#glow)" opacity="0.55"/>
  <polygon points="123,30 277,30 297,62 297,184 200,240 103,184 103,62"
    fill="#08051c"/>
  <polygon points="123,30 277,30 297,62 297,184 200,240 103,184 103,62"
    stroke="#00e5ff" stroke-width="2.2" stroke-linejoin="round"/>

  <!-- Inner shield ring -->
  <polygon points="135,47 265,47 282,74 282,176 200,223 118,176 118,74"
    stroke="#7c3aed" stroke-width="1" stroke-linejoin="round" opacity="0.4"/>

  <!-- Top decorative horizontal rules -->
  <line x1="153" y1="47" x2="247" y2="47" stroke="#00e5ff" stroke-width="0.5" opacity="0.22"/>
  <line x1="157" y1="52" x2="243" y2="52" stroke="#7c3aed" stroke-width="0.35" opacity="0.18"/>

  <!-- Vertex accent dots -->
  <circle cx="123" cy="30"  r="3.5" fill="#f0abfc" filter="url(#glow-sm)"/>
  <circle cx="277" cy="30"  r="3.5" fill="#f0abfc" filter="url(#glow-sm)"/>
  <circle cx="297" cy="62"  r="3"   fill="#00e5ff" opacity="0.65"/>
  <circle cx="297" cy="184" r="3"   fill="#00e5ff" opacity="0.65"/>
  <circle cx="200" cy="240" r="4"   fill="#a855f7" filter="url(#glow-sm)"/>
  <circle cx="103" cy="184" r="3"   fill="#00e5ff" opacity="0.65"/>
  <circle cx="103" cy="62"  r="3"   fill="#00e5ff" opacity="0.65"/>

  <!-- Corner bracket circuit lines (top-left + top-right) -->
  <polyline points="123,30 158,30 158,42" stroke="#00e5ff" stroke-width="0.5" opacity="0.3"/>
  <polyline points="277,30 242,30 242,42" stroke="#00e5ff" stroke-width="0.5" opacity="0.3"/>
  <circle cx="158" cy="42" r="1.2" fill="#00e5ff" opacity="0.5"/>
  <circle cx="242" cy="42" r="1.2" fill="#00e5ff" opacity="0.5"/>

  <!-- Side accent tick marks -->
  <line x1="297" y1="118" x2="306" y2="118" stroke="#00e5ff" stroke-width="0.5" opacity="0.3"/>
  <line x1="297" y1="127" x2="302" y2="127" stroke="#7c3aed" stroke-width="0.4" opacity="0.3"/>
  <line x1="103" y1="118" x2="94"  y2="118" stroke="#00e5ff" stroke-width="0.5" opacity="0.3"/>
  <line x1="103" y1="127" x2="98"  y2="127" stroke="#7c3aed" stroke-width="0.4" opacity="0.3"/>

  <!-- ── EYE CREATURE ─────────────────────────────────────────────── -->
  <!-- Sclera: glow → fill → crisp border -->
  <ellipse cx="200" cy="135" rx="52" ry="31"
    stroke="#00e5ff" stroke-width="5" filter="url(#glow)" opacity="0.48"/>
  <ellipse cx="200" cy="135" rx="52" ry="31" fill="#09071e"/>
  <ellipse cx="200" cy="135" rx="52" ry="31" stroke="#00e5ff" stroke-width="2"/>

  <!-- Upper eyelid arc -->
  <path d="M 148,135 Q 200,100 252,135" stroke="#22d3ee" stroke-width="1.1" opacity="0.32"/>

  <!-- Outer iris decorative ring -->
  <circle cx="200" cy="135" r="37" stroke="#7c3aed" stroke-width="0.6" opacity="0.25"/>

  <!-- Iris: glow → fill → crisp border -->
  <circle cx="200" cy="135" r="27"
    stroke="#7c3aed" stroke-width="5" filter="url(#glow-sm)" opacity="0.45"/>
  <circle cx="200" cy="135" r="27" fill="#130840"/>
  <circle cx="200" cy="135" r="27" stroke="#7c3aed" stroke-width="2"/>

  <!-- Inner iris concentric ring -->
  <circle cx="200" cy="135" r="22" stroke="#22d3ee" stroke-width="0.5" opacity="0.25"/>

  <!-- Iris colour layers -->
  <circle cx="200" cy="135" r="20" fill="#5b21b6" opacity="0.75"/>
  <circle cx="200" cy="135" r="12" fill="#3b0764"/>

  <!-- Vertical slit pupil -->
  <ellipse cx="200" cy="135" rx="3" ry="7" fill="#07051a"/>

  <!-- Highlights -->
  <circle cx="192" cy="128" r="4.5" fill="#ffffff" opacity="0.88"/>
  <circle cx="208" cy="142" r="2.2" fill="#22d3ee" opacity="0.55"/>

  <!-- ── TENTACLES (circuit style with elbow joints) ─────────────── -->
  <!-- Left — from eye left edge (148, 135) -->
  <polyline points="148,135 130,121 107,121" stroke="#22d3ee" stroke-width="1.1" opacity="0.45"/>
  <polyline points="148,135 108,135"          stroke="#22d3ee" stroke-width="1.1" opacity="0.45"/>
  <polyline points="148,135 130,149 107,149" stroke="#22d3ee" stroke-width="1.1" opacity="0.45"/>
  <circle cx="130" cy="121" r="1.5" fill="#22d3ee" opacity="0.5"/>
  <circle cx="130" cy="149" r="1.5" fill="#22d3ee" opacity="0.5"/>

  <!-- Right — from eye right edge (252, 135) -->
  <polyline points="252,135 270,121 293,121" stroke="#22d3ee" stroke-width="1.1" opacity="0.45"/>
  <polyline points="252,135 292,135"          stroke="#22d3ee" stroke-width="1.1" opacity="0.45"/>
  <polyline points="252,135 270,149 293,149" stroke="#22d3ee" stroke-width="1.1" opacity="0.45"/>
  <circle cx="270" cy="121" r="1.5" fill="#22d3ee" opacity="0.5"/>
  <circle cx="270" cy="149" r="1.5" fill="#22d3ee" opacity="0.5"/>

  <!-- Top — from eye top (200, 104) -->
  <polyline points="200,104 186,79 186,53" stroke="#22d3ee" stroke-width="1.1" opacity="0.45"/>
  <polyline points="200,104 200,50"         stroke="#22d3ee" stroke-width="1.1" opacity="0.45"/>
  <polyline points="200,104 214,79 214,53" stroke="#22d3ee" stroke-width="1.1" opacity="0.45"/>
  <circle cx="186" cy="79" r="1.5" fill="#22d3ee" opacity="0.5"/>
  <circle cx="214" cy="79" r="1.5" fill="#22d3ee" opacity="0.5"/>

  <!-- Bottom — from eye bottom (200, 166) — violet to echo bottom shield point -->
  <polyline points="200,166 188,187 188,210" stroke="#a855f7" stroke-width="1.1" opacity="0.45"/>
  <polyline points="200,166 200,230"          stroke="#a855f7" stroke-width="1.1" opacity="0.45"/>
  <polyline points="200,166 212,187 212,210" stroke="#a855f7" stroke-width="1.1" opacity="0.45"/>
  <circle cx="188" cy="187" r="1.5" fill="#a855f7" opacity="0.5"/>
  <circle cx="212" cy="187" r="1.5" fill="#a855f7" opacity="0.5"/>

  <!-- ── SEEDGUARD TEXT ───────────────────────────────────────────── -->
  <!-- To edit: change the text content, font-size, or letter-spacing below -->
  <text x="200" y="268"
    font-family="'Courier New','Lucida Console',monospace"
    font-size="26" font-weight="900" letter-spacing="10"
    text-anchor="middle" fill="#00e5ff"
    filter="url(#text-glow)">SEEDGUARD</text>

  <!-- Subtext (optional — remove or change as needed) -->
  <text x="200" y="284"
    font-family="'Courier New',monospace"
    font-size="8.5" letter-spacing="3.5"
    text-anchor="middle" fill="#7c3aed" opacity="0.75">NOFAP · PMO FREEDOM TRACKER</text>

  <!-- Underline accent -->
  <line x1="112" y1="291" x2="288" y2="291" stroke="#7c3aed" stroke-width="0.6" opacity="0.4"/>
  <circle cx="112" cy="291" r="2" fill="#f0abfc" opacity="0.6"/>
  <circle cx="288" cy="291" r="2" fill="#f0abfc" opacity="0.6"/>
</svg>
